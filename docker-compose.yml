services:
  breath:
    build: .
    container_name: breath
    ports:
      - "8000:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./sw.js:/usr/share/nginx/html/sw.js:ro
      - ./manifest.webmanifest:/usr/share/nginx/html/manifest.webmanifest:ro
      - ./icon.svg:/usr/share/nginx/html/icon.svg:ro
      - ./icon-192.png:/usr/share/nginx/html/icon-192.png:ro
      - ./icon-512.png:/usr/share/nginx/html/icon-512.png:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
