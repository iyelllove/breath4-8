server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # MIME corretto per il manifest PWA
  types {
    text/html                             html;
    text/css                              css;
    application/javascript                js;
    application/manifest+json             webmanifest;
    image/svg+xml                         svg;
    image/png                             png;
    image/x-icon                          ico;
  }
  default_type application/octet-stream;

  # Il service worker NON va cachato dal browser, altrimenti gli update non arrivano
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires off;
  }

  # Manifest e HTML: rivalidazione veloce
  location ~ \.(webmanifest|html)$ {
    add_header Cache-Control "no-cache" always;
    expires off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
